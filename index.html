<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="CardioEcg — AI-assisted clinical ECG analysis platform for hospital cardiology teams." />
  <meta name="robots" content="noindex" />
  <title>CardioEcg — Clinical ECG Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18 production builds -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-M2hJFUPxMIbGlMhHhiJELvq8XFMX0bVhIc1G8TmEJsXRYkA0eFmQVfPSfOaR/dz" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-nEnMy0BqiOEOqVGjBEzKoHRaYVzAO1cVYBEYqI8NJUNpvKjUFBPaVjnQTMo5FJf" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Load order matters: each file registers globals on window that the next file depends on.
    1. design-canvas  — DesignCanvas, DCSection, DCArtboard, DCPostIt
    2. icons          — window.Icons
    3. ecg            — window.EcgStrip, EcgMini, EcgMultiLead  (depends on React hooks)
    4. shell          — window.Sidebar, window.Topbar  (depends on Icons)
    5. screens-*      — window.Landing … window.Report  (depend on Icons, ECG, Shell)
    6. design-system  — window.DesignSystem  (depends on Icons, ECG)
  -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ecg.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens-marketing.jsx"></script>
  <script type="text/babel" src="screens-app1.jsx"></script>
  <script type="text/babel" src="screens-app2.jsx"></script>
  <script type="text/babel" src="screens-app3.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    const W = 1440;
    const H = 900;

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="marketing" title="Marketing" subtitle="Landing & sign-in entry points">
            <DCArtboard id="landing" label="Landing page" width={W} height={2400}>
              <window.Landing />
            </DCArtboard>
            <DCArtboard id="login" label="Sign in" width={W} height={H}>
              <window.Login />
            </DCArtboard>
          </DCSection>

          <DCSection id="clinical" title="Clinical workflow" subtitle="Daily review queue, upload, analysis, sign-off">
            <DCArtboard id="dashboard" label="Dashboard" width={W} height={H}>
              <window.Dashboard />
            </DCArtboard>
            <DCArtboard id="upload" label="Upload ECG" width={W} height={H}>
              <window.Upload />
            </DCArtboard>
            <DCArtboard id="processing" label="AI processing" width={W} height={H}>
              <window.Processing />
            </DCArtboard>
            <DCArtboard id="result" label="ECG result" width={W} height={H}>
              <window.Result />
            </DCArtboard>
          </DCSection>

          <DCSection id="records" title="Records & export" subtitle="Patient management and clinical report output">
            <DCArtboard id="patients" label="Patient management" width={W} height={H}>
              <window.Patients />
            </DCArtboard>
            <DCArtboard id="report" label="Report export" width={W} height={H}>
              <window.Report />
            </DCArtboard>
          </DCSection>

          <DCSection id="system" title="Design system" subtitle="Tokens & components used across the platform">
            <DCArtboard id="ds" label="Components & tokens" width={W} height={1600}>
              <window.DesignSystem />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
